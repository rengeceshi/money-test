<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>赚钱思维类型测试</title>

<style>

body{

font-family:Arial;

background:#f4f6fb;

margin:0;

padding:20px;

}

.card{

background:white;

max-width:600px;

margin:auto;

padding:20px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,0.08);

}

h1{

font-size:26px;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:#f59e0b;

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

margin-top:15px;

}

.option{

border:1px solid #ddd;

padding:12px;

border-radius:10px;

margin-top:10px;

cursor:pointer;

}

.option:hover{

background:#fff7ed;

}

</style>

</head>

<body>

<div class="card" id="home">

<h1>你的赚钱思维类型测试</h1>

<p>

很多时候不是不努力，而是赚钱方式不适合自己。<br>

测一测看看你更适合哪种赚钱方向。

</p>

<button onclick="start()">开始测试</button>

</div>

<div class="card" id="quiz" style="display:none">

<h2 id="q"></h2>

<div id="opts"></div>

</div>

<div class="card" id="result" style="display:none">

<h2>你的赚钱类型是</h2>

<h1 id="type"></h1>

<p id="adv"></p>

<button onclick="start()">重新测试</button>

</div>

<script>

let qs=[

["你更喜欢哪种赚钱方式？","马上开始","研究方法","长期积累","抓机会"]

];

let i=0;

let score=[0,0,0,0];

function start(){

home.style.display="none";

result.style.display="none";

quiz.style.display="block";

next();

}

function next(){

if(i>=qs.length){

show();

return;

}

q.innerHTML=qs[i][0];

opts.innerHTML="";

for(let j=1;j<=4;j++){

let d=document.createElement("div");

d.className="option";

d.innerHTML=qs[i][j];

d.onclick=function(){

score[j-1]++;

i++;

next();

};

opts.appendChild(d);

}

}

function show(){

quiz.style.display="none";

result.style.display="block";

let r=score.indexOf(Math.max(...score));

let types=["行动型","思考型","稳定型","机会型"];

type.innerHTML=types[r];

adv.innerHTML="适合你的赚钱方式是："+types[r];

}

</script>

</body>

</html>
